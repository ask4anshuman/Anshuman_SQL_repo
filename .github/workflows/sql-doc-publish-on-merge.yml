name: SQL Doc Publish On Merge

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  publish-after-merge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SQL repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          token: ${{ secrets.SQL_GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Validate required secrets
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          TOOL_REPO_TOKEN: ${{ secrets.TOOL_REPO_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
        run: |
          missing=""
          [ -z "$LLM_API_KEY" ] && missing="$missing LLM_API_KEY"
          [ -z "$CONFLUENCE_USERNAME" ] && missing="$missing CONFLUENCE_USERNAME"
          [ -z "$CONFLUENCE_API_TOKEN" ] && missing="$missing CONFLUENCE_API_TOKEN"
          [ -z "$TOOL_REPO_TOKEN" ] && missing="$missing TOOL_REPO_TOKEN"
          [ -z "$SQL_GITHUB_TOKEN" ] && missing="$missing SQL_GITHUB_TOKEN"
          if [ -n "$missing" ]; then
            echo "Missing required repository secrets:$missing"
            exit 1
          fi

      - name: Checkout tool repository
        uses: actions/checkout@v4
        with:
          repository: ask4anshuman/Code-Summarization-Project
          path: sql-doc-tool
          token: ${{ secrets.TOOL_REPO_TOKEN }}
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tool dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sql-doc-tool/requirements.txt

      - name: Publish approved SQL docs to Confluence
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SQL_GITHUB_TOKEN: ${{ secrets.SQL_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          python sql-doc-tool/main.py --config .github/sql_confluence.yml --repo Anshuman_SQL_repo publish-merged --pr-number "$PR_NUMBER"

      - name: Ensure Confluence link comment exists in SQL files
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          import os

          marker_prefix = "-- [Doc] Confluence:"
          updated = 0

          # First, debug: list all SQL files in the repo
          print("=== DEBUG: All SQL files in repository ===")
          for sql_file in sorted(Path('.').rglob('*.sql')):
            print(f"  Found SQL file: {sql_file}")

          config_path = Path('.github/sql_confluence.yml')
          if not config_path.exists():
            print('Config file not found; skipping fallback link injection.')
            raise SystemExit(0)

          cfg = yaml.safe_load(config_path.read_text(encoding='utf-8')) or {}
          repos = cfg.get('repositories') if isinstance(cfg, dict) else None
          if not repos:
            repos = [cfg]

          repo_cfg = None
          for item in repos:
            if isinstance(item, dict) and item.get('name') == 'Anshuman_SQL_repo':
              repo_cfg = item
              break
          if repo_cfg is None and repos:
            repo_cfg = repos[0]

          repo_cfg = repo_cfg or {}
          cache_path = Path(str(repo_cfg.get('cache_path', '.sql_confluence_cache.yml')))
          base_url = str(repo_cfg.get('confluence_base_url', '')).rstrip('/')
          space = str(repo_cfg.get('confluence_space', '')).strip()

          if not cache_path.exists():
            print(f'Cache file {cache_path} not found; skipping fallback link injection.')
            raise SystemExit(0)

          cache = yaml.safe_load(cache_path.read_text(encoding='utf-8')) or {}
          if not isinstance(cache, dict):
            print('Cache content is not a mapping; skipping fallback link injection.')
            raise SystemExit(0)

          print(f"=== DEBUG: Cache file ({cache_path}) contains {len(cache)} entries ===")
          for file_key, page_id in cache.items():
            print(f"  Cache entry: {file_key} -> {page_id}")
            sql_file = Path(str(file_key))
            if not sql_file.is_absolute():
              sql_file = Path('.') / sql_file
            
            print(f"    Resolved path: {sql_file}")
            print(f"    Absolute: {sql_file.resolve()}")
            print(f"    Exists: {sql_file.exists()}")
            print(f"    Suffix: {sql_file.suffix} (is_sql: {sql_file.suffix.lower() == '.sql'})")
            
            if not sql_file.exists() or sql_file.suffix.lower() != '.sql':
              print(f"    -> SKIPPED")
              continue
            
            print(f"    -> PROCESSING")

            page_id_text = str(page_id).strip()
            if not page_id_text:
              continue

            if base_url and space:
              confluence_url = f"{base_url}/spaces/{space}/pages/{page_id_text}"
            elif base_url:
              confluence_url = f"{base_url}/pages/{page_id_text}"
            else:
              continue

            marker_line = f"{marker_prefix} {confluence_url}"
            text = sql_file.read_text(encoding='utf-8')
            lines = text.splitlines()

            marker_index = None
            for idx, line in enumerate(lines):
              if line.startswith(marker_prefix):
                marker_index = idx
                break

            if marker_index is None:
              lines.insert(0, marker_line)
            else:
              lines[marker_index] = marker_line

            new_text = '\n'.join(lines)
            if text.endswith('\n'):
              new_text += '\n'

            if new_text != text:
              sql_file.write_text(new_text, encoding='utf-8')
              updated += 1
              print(f'Injected/updated Confluence link in {sql_file}')

          print(f'Total SQL files updated with Confluence links: {updated}')
          PY

      - name: Move Confluence link comment to line 4 in SQL files
        run: |
          python - <<'PY'
          from pathlib import Path

          marker_prefix = "-- [Doc] Confluence:"
          updated = 0

          for sql_file in Path('.').rglob('*.sql'):
            text = sql_file.read_text(encoding='utf-8')
            lines = text.splitlines()

            marker_index = None
            for idx, line in enumerate(lines):
              if line.startswith(marker_prefix):
                marker_index = idx
                break

            if marker_index is None:
              continue

            # Move the existing marker line to line 4 (index 3). This also
            # pushes down any code/comment currently present at line 4.
            marker_line = lines.pop(marker_index)
            while len(lines) < 3:
              lines.append('')
            lines.insert(3, marker_line)

            new_text = '\n'.join(lines)
            if text.endswith('\n'):
              new_text += '\n'

            if new_text != text:
              sql_file.write_text(new_text, encoding='utf-8')
              updated += 1
              print(f"Placed Confluence comment at line 4 in {sql_file}")

          print(f"Total SQL files normalized: {updated}")
          PY

      - name: Commit Confluence documentation links back to SQL files
        env:
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}
        run: |
          git config user.name "sql-doc-bot"
          git config user.email "sql-doc-bot@noreply.github.com"
          echo "=== Current Git Status ==="
          git status --short
          echo ""
          echo "=== Scanning for Confluence markers in SQL files ==="
          git grep -n "^-- \[Doc\] Confluence:" -- '*.sql' '**/*.sql' || echo "No markers found"
          echo ""
          echo "=== Staging SQL files ==="
          git add -A -- '*.sql' '**/*.sql'
          echo "=== Staged changes ==="
          git diff --cached --name-only -- '*.sql' '**/*.sql' || echo "No SQL files staged"
          
          if ! git diff --cached --quiet; then
            echo ""
            echo "=== Committing SQL files ==="
            git commit -m "docs: add Confluence documentation links to SQL files [skip ci]"
            echo ""
            echo "=== Pushing to branch: ${TARGET_BRANCH} ==="
            git push origin "HEAD:${TARGET_BRANCH}" -v
            echo "SUCCESS: Committed Confluence links to SQL files on ${TARGET_BRANCH}"
          else
            echo ""
            echo "INFO: No SQL file changes detected. Cache file may be empty or cache entries did not match existing files."
            echo "Files that WOULD have been matched if they existed:"
            echo "(This info comes from cache file if present)"
          fi