repositories:
  - name: Anshuman_SQL_repo
    repo_root: "."
    github_repo: "ask4anshuman/Anshuman_SQL_repo"
    github_base_url: "https://api.github.com"

    sql_glob: "**/*.sql"

    confluence_base_url: "https://ask4anshuman.atlassian.net/wiki"
    confluence_space: "~712020e9a8b73325a347c490df3513526fcc64"
    confluence_parent_page_id: "491521"
    page_title_prefix: "SQL Summary - "

    git_diff_range: "HEAD~1..HEAD"
    cache_path: ".sql_confluence_cache.yml"

    llm_provider: "openai"
    llm_model: "gpt-4.1-mini"
    llm_api_base_url: "https://api.openai.com/v1/chat/completions"

    managed_section_start: "<!-- SQL_SUMMARY_START -->"
    managed_section_end: "<!-- SQL_SUMMARY_END -->"